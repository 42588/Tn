# cargo-deny: license + advisory gate.
# Tn ships open-source (GPL-3.0-or-later), so GPL is allowed here — this file
# exists to keep the dependency tree to known, compatible licenses and to flag
# advisories. Run with `cargo deny check`.

[graph]
all-features = true

[licenses]
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "GPL-3.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[advisories]
yanked = "warn"

[sources]
unknown-registry = "warn"
unknown-git = "allow"
