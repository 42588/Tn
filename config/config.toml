# Tn 配置文件 — 首次运行自动写入 %APPDATA%\Tn\config.toml。
# 改动后重启 Tn 生效(配置热重载见后续里程碑)。schema 见 docs/系统架构索引.md §4.4。
# 所有字段都可省略,缺省时回退到内置默认值。颜色取自 [appearance].theme 指向的主题文件。

[general]
scrollback_lines = 5000        # 每个会话保留的滚动历史行数
confirm_close    = true       # 关闭仍在运行的会话前确认(暂未接线)
billing_mode     = "auto"     # 用量药丸的「初始」显示维度。每个窗格可点击药丸随时切换
                              #   ($ 费用 → % 上下文 → token 消耗),互不影响(运行时、不写盘)。
                              #   可选值:auto = 按登录方式自动判断(会员→%,API key→$);
                              #   api = 估算美元 $X.XX;subscription = 上下文 %;tokens = token 消耗。
# 想给某个 agent 单独定初始默认(省略 = 跟随上面的 billing_mode):
# claude_billing = "subscription"  # Claude 会员 → 起始显 %
# codex_billing  = "tokens"        # Codex 代理模型 → 起始显 token 消耗
#   注:$ 需模型在内置价目表;自定义/代理模型(如 moonbridge)无价 → 显示 $0.00。

[font]
family      = "CaskaydiaCove Nerd Font"  # 等宽 Nerd Font(含图标/特殊字符/emoji;需系统已安装,缺失则 DirectWrite 回退)
size        = 14.0            # 磅值
line_height = 1.3             # 行高 = size × 此倍数
fallback    = []             # CJK / emoji 回退字体族(schema 已留,暂未启用)

[appearance]
theme = "Tn Dark"             # 主题名 = %APPDATA%\Tn\themes\*.toml 里的 name 字段
# opacity  = 0.96            # 覆盖主题的窗口不透明度(暂未启用)
# backdrop = "mica"          # mica | acrylic | solid,覆盖主题窗口质感(暂未启用)

# 编辑器(Quick Look / Editor Pane 共享)。
[editor]
animations = "subtle"          # off | subtle | full —— 打字反馈动画级别(默认 subtle)。
                               # off = 光标瞬时反相块、零动画;subtle = 轻量且按性能降级;
                               # full = 不加保守性能上限。系统「减少动态效果」或高渲染负载时
                               # 一律降级为瞬时(光标始终精确、输入不卡)。

# Quick Terminal —— Quake/Guake 式下拉悬浮终端(M5)。全局热键随时唤出/隐藏,
# 边缘滑入,失焦自动隐藏;最适合不打断当前工作就召唤通用 Agent 或 shell。见 docs/系统架构索引.md §8 M5。
[quick_terminal]
enabled        = true            # 是否注册全局热键
hotkey         = "ctrl+alt+space" # 切换热键:modifier(ctrl/alt/shift/win)用 + 连接 + 单个键
position       = "top"           # top | bottom | left | right | center —— 停靠/滑入的边
height_percent = 45.0            # 占工作区高度的百分比(top/bottom/center 用)
width_percent  = 60.0            # 占工作区宽度的百分比(left/right/center 用)
animation_ms   = 150             # 滑入/滑出动画时长(毫秒;0 = 不动画)
autohide       = true            # 失焦时自动隐藏
# profile      = "Agent"        # 在其中启动的 [[profiles]] 名;省略 = 默认 pwsh

[[agents]]
id = "agent"
label = "Agent"
short = "Agent"
aliases = ["agent"]
accent = "#7AA2F7"
glyph = "spark"
capabilities = []

# 会话启动器条目 —— 配置即数据(见 docs/产品体验索引.md §6)。
# M4 命令面板消费;当前版本仅解析保存,不影响运行。
[[profiles]]
name    = "PowerShell"
kind    = "shell"            # shell | wsl | ssh | agent
command = "powershell.exe"
args    = ["-NoLogo"]

[[profiles]]
name   = "Ubuntu"
kind   = "wsl"
distro = "Ubuntu"

[[profiles]]
name    = "Agent"
kind    = "agent"
agent   = "agent"
command = "agent"
glyph   = "spark"

# 远程 SSH 主机示例(M2b)。去掉注释并改成你的主机即可在命令面板/Quick Terminal 启动。
# kind="ssh" + host(可写 "host:port",默认端口 22)+ user(省略 = $USERNAME)。
# 认证:依次尝试 ~/.ssh/id_ed25519 | id_ecdsa | id_rsa。
# 注:ssh-agent、host-key 校验(known_hosts)、密码交互输入尚未接入(WIP);当前接受任意主机密钥。
# [[profiles]]
# name = "我的服务器"
# kind = "ssh"
# host = "example.com"        # 或 "example.com:2222"
# user = "ubuntu"
# accent = "#7AA2F7"

# 键位:动作表([[actions]])与绑定表([[keybindings]])分离,
# 一个动作可绑多键、用户按 id 改键(见 docs/外部参考资料索引.md §七)。
# 这些是内置默认值的镜像;配置里的绑定叠加在默认之上(M1 为追加语义:
# 可新增/改键,暂不能取消默认键)。可用动作:new_tab / split_right /
# split_down / close_pane / next_pane / next_tab / reload_config /
# grow_width / shrink_width / grow_height / shrink_height。
[[actions]]
id      = "new_tab"
command = "new_tab"

[[actions]]
id      = "split_right"
command = "split_right"

[[actions]]
id      = "split_down"
command = "split_down"

[[actions]]
id      = "close_pane"
command = "close_pane"

[[actions]]
id      = "next_pane"
command = "next_pane"

[[actions]]
id      = "next_tab"
command = "next_tab"

[[actions]]
id      = "reload_config"
command = "reload_config"

[[actions]]
id      = "grow_width"
command = "grow_width"

[[actions]]
id      = "shrink_width"
command = "shrink_width"

[[actions]]
id      = "grow_height"
command = "grow_height"

[[actions]]
id      = "shrink_height"
command = "shrink_height"

[[keybindings]]
keys = "ctrl-shift-t"
id   = "new_tab"

[[keybindings]]
keys = "ctrl-shift-d"
id   = "split_right"

[[keybindings]]
keys = "ctrl-shift-e"
id   = "split_down"

[[keybindings]]
keys = "ctrl-shift-w"
id   = "close_pane"

[[keybindings]]
keys = "ctrl-shift-]"
id   = "next_pane"

[[keybindings]]
keys = "ctrl-tab"
id   = "next_tab"

[[keybindings]]
keys = "ctrl-shift-r"
id   = "reload_config"

[[keybindings]]
keys = "ctrl-shift-right"
id   = "grow_width"

[[keybindings]]
keys = "ctrl-shift-left"
id   = "shrink_width"

[[keybindings]]
keys = "ctrl-shift-down"
id   = "grow_height"

[[keybindings]]
keys = "ctrl-shift-up"
id   = "shrink_height"
